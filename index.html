<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyApp</title>
  <meta name="description" content="MyApp - CSS Android app layout demo">
  <link rel="stylesheet" href="css/responsive-base.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css?family=Averia+Libre" rel="stylesheet">

<body class="design">
  <div class="container-fluid">
    <div class="row"><div class="space"></div></div>
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <img src="images/logo.png" class="imge" alt="MyApp logo">
      </div>
      <div class="col-md-4"></div>
    </div>
    <div class="row">
      <div class="col-md-4"></div>
      <div class="col-md-4">
        <div class="phonelayout">
          <img src="images/mobile_page_view.png" class="imagw" alt="Phone frame" loading="lazy">
          <div class="topic">Aptitude&gt;</div>
          <div class="question">A boy multiplied 987 by a certain number and obtained 559981 as his answer. If in the answer both 9 are wrong and the other digits are correct, then the correct answer would be:</div>
          <div class="option_A">553681</div>
          <div class="option_B">555181</div>
          <div class="option_A">555681</div>
          <div class="option_B">556581</div>
          <div class="playlayout"></div>
          <a href="https://play.google.com/store/apps/details?id=com.dailyprep.app.aptitude">
            <img src="images/googlePlay.png" class="logo" alt="Get it on Google Play" loading="lazy">

      </div>
      <div class="col-md-4"></div>
    </div>
  </div>
